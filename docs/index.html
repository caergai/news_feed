<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Horizon News Archive</title>
<style>
  :root {
    --bg: #0f1117;
    --text: #e5e7eb;
    --accent: #6ee7b7;
    --link: #7dd3fc;
    --border: #2d2f3a;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 600px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 2rem;
  }
  ul { list-style: none; padding: 0; }
  li { margin: 1rem 0; }
  a { 
    color: var(--link); 
    text-decoration: none; 
    font-size: 1.2rem; 
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: inline-block;
    transition: background 0.2s;
  }
  a:hover { background: rgba(125,211,252,0.1); }
</style>
</head>
<body>
  <h1>The Horizon News Archive</h1>
  <p style="margin-bottom: 2rem; color: #9ca3af;">Select a date to view the digest</p>
  <ul>
    <li><a href="reports/2026-06-16.html">2026-06-16</a></li>

  </ul>
</body>
</html>
